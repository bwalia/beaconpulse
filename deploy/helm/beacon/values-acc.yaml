# ── Acceptance (staging/pre-prod) environment ──────────────────────────────
# Namespace: acc   Host: https://acc.beaconpulse.net
# Secrets:   SealedSecrets — sealed/acc/beacon-secrets.sealed.yaml
#
# Not Vault, despite the default: the policy on secret/data/beaconpulse/* answers 403,
# which is why int and test are sealed too. An ExternalSecret that never resolves fails
# quietly — helm succeeds, the pods come up with no POSTGRES_PASSWORD, and the only
# symptom is a dead environment behind a green deploy. Regenerate with:
#   deploy/scripts/seal-secrets.sh acc
env: acc
host: acc.beaconpulse.net
secretsSource: sealed

app:
  beaconEnv: staging
  logLevel: info
  promRetention: 15d
  replicas:
    api: 2
    frontend: 1

ai:
  enabled: true
  baseURL: https://ollama.workstation.co.uk
  model: qwen3:30b-a3b
  timeout: 60s

storage:
  postgres: 10Gi
  redis: 1Gi
  prometheus: 10Gi
  alertmanager: 1Gi

ingress:
  enabled: true
  tls: true

# Images for this environment live on its own SpectonCR host.
image:
  registry: acc-spectoncr.diytaxreturn.co.uk
  # Same arrangement as int: the namespace already carries a `nebulacr-login`
  # dockerconfigjson whose auth covers acc-spectoncr.diytaxreturn.co.uk,
  # so the chart references it rather than minting a second copy of the same
  # registry credentials. One place to rotate, and no registry password in this
  # repo's sealed files at all.
  #
  # The chart does NOT own this secret. If it is ever absent from the namespace, or
  # its auth stops covering this host, the symptom is ImagePullBackOff on every pod
  # rather than a failed deploy — helm has nothing to check here.
  pullSecret: nebulacr-login
  pullSecretCreate: false
