# ── Test environment ────────────────────────────────────────────────────────
# Namespace: test   Host: https://test.beaconpulse.net
# Secrets:   SealedSecrets — sealed/test/beacon-secrets.sealed.yaml
#
# Not Vault, despite the default: the policy on secret/data/beaconpulse/* answers 403,
# which is why int moved to sealed secrets too. An ExternalSecret that never resolves
# fails quietly — helm succeeds, the pods come up with no POSTGRES_PASSWORD, and the
# only symptom is a dead environment behind a green deploy. Regenerate with:
#   deploy/scripts/seal-secrets.sh test
env: test
host: test.beaconpulse.net
secretsSource: sealed

app:
  beaconEnv: staging
  logLevel: info
  promRetention: 7d
  replicas:
    api: 1
    frontend: 1

# On, so the feature can actually be exercised here. BEACON_AI_API_KEY is sealed with
# the rest; an absent key degrades to "no analysis" rather than blocking pod start.
ai:
  enabled: true
  baseURL: https://ollama.workstation.co.uk
  model: qwen3:30b-a3b
  timeout: 60s

storage:
  postgres: 5Gi
  redis: 1Gi
  prometheus: 5Gi
  alertmanager: 1Gi

ingress:
  enabled: true
  tls: true

# Images for this environment live on its own SpectonCR host.
image:
  registry: test-spectoncr.diytaxreturn.co.uk
  # Same arrangement as int: the namespace already carries a `nebulacr-login`
  # dockerconfigjson whose auth covers test-spectoncr.diytaxreturn.co.uk,
  # so the chart references it rather than minting a second copy of the same
  # registry credentials. One place to rotate, and no registry password in this
  # repo's sealed files at all.
  #
  # The chart does NOT own this secret. If it is ever absent from the namespace, or
  # its auth stops covering this host, the symptom is ImagePullBackOff on every pod
  # rather than a failed deploy — helm has nothing to check here.
  pullSecret: nebulacr-login
  pullSecretCreate: false
