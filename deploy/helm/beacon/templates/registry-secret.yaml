{{- /*
Renders nothing when image.pullSecretCreate=false — the pull secret already exists
in the namespace and is owned elsewhere (int reuses the shared `nebulacr-login`,
which already carries auth for the SpectonCR host). The pods still reference it via
beacon.imagePullSecrets; we just don't try to create or own it.
*/ -}}
{{- if and .Values.image.pullSecret .Values.image.pullSecretCreate }}
{{- if eq .Values.secretsSource "sealed" }}
{{- $sealed := printf "sealed/%s/beacon-registry.sealed.yaml" .Values.env }}
{{- if not (.Files.Get $sealed) }}
{{- fail (printf "secretsSource=sealed and image.pullSecretCreate=true, but %s is missing. Either add REGISTRY_USERNAME/REGISTRY_PASSWORD to deploy/.env and re-run deploy/scripts/seal-secrets.sh %s, or set image.pullSecretCreate=false to reuse an existing pull secret." $sealed .Values.env) }}
{{- end }}
{{ .Files.Get $sealed }}
{{- else if eq .Values.secretsSource "external" }}
# Pull secret for the private SpectonCR registry, built by ESO from the Vault
# keys REGISTRY_USERNAME + REGISTRY_PASSWORD (same secret/beaconpulse/<env>/config
# path). ESO templates the standard dockerconfigjson so the kubelet can pull.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ .Values.image.pullSecret }}
  labels:
    {{- include "beacon.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.externalSecret.refreshInterval | quote }}
  secretStoreRef:
    name: {{ .Values.externalSecret.storeName }}
    kind: {{ .Values.externalSecret.storeKind }}
  target:
    name: {{ .Values.image.pullSecret }}
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      type: kubernetes.io/dockerconfigjson
      data:
        # Helm renders .Values.image.registry; the backtick-wrapped expression is
        # left verbatim for ESO to evaluate against the fetched credentials.
        .dockerconfigjson: '{"auths":{"{{ .Values.image.registry }}":{"auth":"{{ `{{ printf "%s:%s" .REGISTRY_USERNAME .REGISTRY_PASSWORD | b64enc }}` }}"}}}'
  data:
    - secretKey: REGISTRY_USERNAME
      remoteRef:
        key: {{ .Values.externalSecret.vaultKeyPrefix }}/{{ .Values.env }}/{{ .Values.externalSecret.vaultKeySuffix }}
        property: REGISTRY_USERNAME
    - secretKey: REGISTRY_PASSWORD
      remoteRef:
        key: {{ .Values.externalSecret.vaultKeyPrefix }}/{{ .Values.env }}/{{ .Values.externalSecret.vaultKeySuffix }}
        property: REGISTRY_PASSWORD
{{- else }}
# Fallback pull secret for local testing (secretsSource=plain). Provide creds via
# --set secrets.registryUsername=... secrets.registryPassword=...
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.image.pullSecret }}
  labels:
    {{- include "beacon.labels" . | nindent 4 }}
type: kubernetes.io/dockerconfigjson
stringData:
  .dockerconfigjson: {{ printf `{"auths":{"%s":{"auth":"%s"}}}` .Values.image.registry (printf "%s:%s" .Values.secrets.registryUsername .Values.secrets.registryPassword | b64enc) | quote }}
{{- end }}
{{- end }}
