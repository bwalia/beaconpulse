apiVersion: v1
kind: ConfigMap
metadata:
  name: beacon-prometheus-config
  labels:
    {{- include "beacon.labels" . | nindent 4 }}
data:
  prometheus.yml: |
    # Beacon-managed Prometheus base config. The dynamic scrape jobs + alert rules
    # (one per monitor) are generated by Beacon into /etc/prometheus/generated and
    # pulled in below; Beacon hot-reloads on every change.
    global:
      scrape_interval: 30s
      evaluation_interval: 15s
      external_labels:
        cluster: beacon-{{ .Values.env }}

    alerting:
      alertmanagers:
        - static_configs:
            - targets: ['{{ include "beacon.name" "alertmanager" }}:9093']

    rule_files:
      - /etc/prometheus/generated/rules_*.yml

    scrape_config_files:
      - /etc/prometheus/generated/scrape_*.yml

    scrape_configs:
      - job_name: prometheus
        static_configs:
          - targets: ['localhost:9090']
      - job_name: beacon-api
        metrics_path: /metrics
        static_configs:
          - targets: ['{{ include "beacon.name" "api" }}:8080']
      - job_name: blackbox-exporter
        metrics_path: /metrics
        static_configs:
          - targets: ['{{ include "beacon.name" "blackbox" }}:9115']
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: beacon-alertmanager-config
  labels:
    {{- include "beacon.labels" . | nindent 4 }}
data:
  alertmanager.yml: |
    # All alerts are forwarded to Beacon's webhook, which owns delivery + routing.
    # The bearer token is read from a file (mounted from the beacon-secrets Secret)
    # so it never lives in this ConfigMap.
    global:
      resolve_timeout: 5m

    route:
      receiver: beacon
      group_by: ['alertname', 'monitor_id']
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 1h

    receivers:
      - name: beacon
        webhook_configs:
          - url: http://{{ include "beacon.name" "api" }}:8080/api/v1/alerts/webhook
            send_resolved: true
            http_config:
              authorization:
                type: Bearer
                credentials_file: /etc/alertmanager/secret/webhook-token

    inhibit_rules:
      - source_matchers: [severity="critical"]
        target_matchers: [severity="warning"]
        equal: ['monitor_id']
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: beacon-blackbox-seed
  labels:
    {{- include "beacon.labels" . | nindent 4 }}
data:
  # Minimal seed so Blackbox can start before the worker's first reconcile writes
  # the real per-monitor modules. Beacon overwrites /etc/blackbox/blackbox.yml at
  # runtime; this is only the bootstrap.
  blackbox.yml: |
    modules:
      http_2xx:
        prober: http
        timeout: 10s
        http:
          method: GET
          preferred_ip_protocol: ip4
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: beacon-nginx-config
  labels:
    {{- include "beacon.labels" . | nindent 4 }}
data:
  nginx.conf: |
    # Beacon single-port, multi-tenant gateway (Kubernetes variant).
    #
    #   /              -> dashboard (Next.js)
    #   /api/          -> Beacon API
    #   /prometheus/   -> Prometheus UI, every data query filtered to the caller's
    #                     org_id via prom-label-proxy
    #   /alertmanager/ -> Alertmanager UI, filtered to the caller
    #
    # Navigations to /prometheus/ and /alertmanager/ are authenticated with an
    # auth_request subrequest to the API, which validates the httpOnly beacon_proxy
    # cookie and returns the caller's org id in X-Org-Id. Upstreams are stable
    # ClusterIP Services, so plain proxy_pass (resolved at startup) is sufficient.
    worker_processes auto;
    events { worker_connections 1024; }

    http {
        include       /etc/nginx/mime.types;
        default_type  application/octet-stream;
        sendfile      on;
        server_tokens off;
        client_max_body_size 5m;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;

        server {
            listen 80;

            # ---- gateway auth subrequest (validates the beacon_proxy cookie) ----
            location = /__beacon_authz {
                internal;
                proxy_pass              http://{{ include "beacon.name" "api" }}:8080/api/v1/proxy/authorize;
                proxy_pass_request_body off;
                proxy_set_header        Content-Length "";
            }
            error_page 401 = @needs_login;
            location @needs_login { return 302 /; }

            # ---- Beacon API ----
            location /api/     { proxy_pass http://{{ include "beacon.name" "api" }}:8080; }
            location = /healthz { proxy_pass http://{{ include "beacon.name" "api" }}:8080; }
            location = /readyz  { proxy_pass http://{{ include "beacon.name" "api" }}:8080; }
            location = /livez   { proxy_pass http://{{ include "beacon.name" "api" }}:8080; }

            # ================= Prometheus (tenant-filtered) =================
            location = /prometheus { return 301 /prometheus/; }
            location ^~ /prometheus/federate { return 403; }
            location ~ ^/prometheus/api/ {
                auth_request     /__beacon_authz;
                auth_request_set $org_id $upstream_http_x_org_id;
                proxy_set_header X-Org-Id $org_id;
                rewrite ^/prometheus/(.*)$ /$1 break;
                proxy_pass http://{{ include "beacon.name" "prom-label-proxy-prom" }}:8080;
            }
            location /prometheus/ {
                auth_request /__beacon_authz;
                rewrite ^/prometheus/(.*)$ /$1 break;
                proxy_pass http://{{ include "beacon.name" "prometheus" }}:9090;
            }

            # ================= Alertmanager (tenant-filtered) =================
            location = /alertmanager { return 301 /alertmanager/; }
            location ~ ^/alertmanager/api/ {
                auth_request     /__beacon_authz;
                auth_request_set $org_id $upstream_http_x_org_id;
                proxy_set_header X-Org-Id $org_id;
                rewrite ^/alertmanager/(.*)$ /$1 break;
                proxy_pass http://{{ include "beacon.name" "prom-label-proxy-am" }}:8080;
            }
            location /alertmanager/ {
                auth_request /__beacon_authz;
                rewrite ^/alertmanager/(.*)$ /$1 break;
                proxy_pass http://{{ include "beacon.name" "alertmanager" }}:9093;
            }

            # ================= Blackbox — NOT exposed to tenants =============
            location /blackbox/ { return 404; }

            # ---- Dashboard (Next.js) — everything else ----
            location / {
                proxy_pass http://{{ include "beacon.name" "frontend" }}:3000;
                proxy_set_header Upgrade    $http_upgrade;
                proxy_set_header Connection "upgrade";
            }
        }
    }
