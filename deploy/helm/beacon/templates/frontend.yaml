apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  labels:
    {{- include "beacon.labels" . | nindent 4 }}
    {{- include "beacon.selector" "frontend" | nindent 4 }}
spec:
  replicas: {{ .Values.app.replicas.frontend }}
  selector:
    matchLabels:
      {{- include "beacon.selector" "frontend" | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "beacon.labels" . | nindent 8 }}
        {{- include "beacon.selector" "frontend" | nindent 8 }}
    spec:
      containers:
        - name: frontend
          image: {{ include "beacon.image" (dict "repo" .Values.image.frontend "tag" .Values.image.tag) }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          # The image is built with NEXT_PUBLIC_API_BASE_URL="" so the browser
          # calls the API same-origin (/api/...) through the gateway.
          env:
            - name: PORT
              value: "3000"
            - name: NODE_ENV
              value: "production"
          ports:
            - containerPort: 3000
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            {{- toYaml .Values.resources.frontend | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  labels:
    {{- include "beacon.labels" . | nindent 4 }}
spec:
  selector:
    {{- include "beacon.selector" "frontend" | nindent 4 }}
  ports:
    - port: 3000
      targetPort: 3000
