apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  labels:
    {{- include "beacon.labels" . | nindent 4 }}
    {{- include "beacon.selector" "api" | nindent 4 }}
  annotations:
    # Stakater Reloader rolls this Deployment when beacon-secrets changes (e.g.
    # ESO syncs a Vault rotation) so env-injected secrets actually reach pods.
    reloader.stakater.com/auto: "true"
spec:
  replicas: {{ .Values.app.replicas.api }}
  # Shares an RWO control-plane volume with prometheus/blackbox; Recreate avoids
  # two writers racing during a rollout.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "beacon.selector" "api" | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "beacon.labels" . | nindent 8 }}
        {{- include "beacon.selector" "api" | nindent 8 }}
    spec:
      {{- include "beacon.imagePullSecrets" . | nindent 6 }}
      # Run as the image's non-root beacon user; fsGroup lets it write the shared
      # control-plane volumes (Prometheus generated files + Blackbox config).
      securityContext:
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
      {{- with .Values.controlPlaneNodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: api
          image: {{ include "beacon.image" (dict "repo" .Values.image.api "tag" .Values.image.tag) }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["api"]
          ports:
            - containerPort: 8080
          env:
            {{- include "beacon.backendEnv" . | nindent 12 }}
          startupProbe:
            httpGet:
              path: /livez
              port: 8080
            periodSeconds: 5
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /livez
              port: 8080
            periodSeconds: 20
            timeoutSeconds: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8080
            periodSeconds: 10
            timeoutSeconds: 5
          resources:
            {{- toYaml .Values.resources.api | nindent 12 }}
          volumeMounts:
            {{- include "beacon.backendVolumeMounts" . | nindent 12 }}
      volumes:
        {{- include "beacon.backendVolumes" . | nindent 8 }}
---
apiVersion: v1
kind: Service
metadata:
  name: api
  labels:
    {{- include "beacon.labels" . | nindent 4 }}
spec:
  selector:
    {{- include "beacon.selector" "api" | nindent 4 }}
  ports:
    - port: 8080
      targetPort: 8080
