# Beacon-managed Prometheus base configuration.
#
# This file is STATIC and mounted read-only. The dynamic parts — one scrape job
# and its alert rules per monitor — are generated by Beacon into the `generated/`
# directory and pulled in below via `scrape_config_files` and `rule_files`.
# Beacon hot-reloads Prometheus (POST /-/reload) after every change, so nothing
# here needs manual editing when monitors are added or removed.

global:
  scrape_interval: 30s
  evaluation_interval: 15s
  external_labels:
    cluster: beacon

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

# Alert rules generated by Beacon (one file, one group per reconcile).
rule_files:
  - /etc/prometheus/generated/rules_*.yml

# Per-monitor scrape jobs generated by Beacon.
scrape_config_files:
  - /etc/prometheus/generated/scrape_*.yml

# Static jobs: Prometheus self-monitoring, the Beacon API, and Blackbox itself.
scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

  - job_name: beacon-api
    metrics_path: /metrics
    static_configs:
      - targets: ['api:8080']

  - job_name: blackbox-exporter
    metrics_path: /metrics
    static_configs:
      - targets: ['blackbox:9115']
