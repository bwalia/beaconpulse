# Beacon single-port, multi-tenant gateway.
#
#   /               -> dashboard (Next.js)
#   /api/           -> Beacon API
#   /prometheus/    -> 302 to Beacon's /explore. The stock Prometheus UI is NOT
#                      served to tenants: its Targets/Config/TSDB/Service-Discovery
#                      pages read GLOBAL instance state and cannot be tenant-scoped.
#                      The tenant-filtered API (/prometheus/api/) IS served, via
#                      prom-label-proxy, and is what /explore queries.
#   /alertmanager/  -> Alertmanager UI, alerts/silences filtered to the caller
#   /blackbox/      -> Blackbox exporter (operator-only; cannot be tenant-filtered)
#
# TENANCY: navigations to /prometheus/ and /alertmanager/ are authenticated with
# an `auth_request` subrequest to the Beacon API, which validates the httpOnly
# `beacon_proxy` cookie and returns the caller's org id in X-Org-Id. That header
# is forwarded to prom-label-proxy, which injects {org_id="<tenant>"} into every
# PromQL query and filters rules/alerts — so a tenant physically cannot express a
# query that reads another tenant's series.
#
# Upstreams resolve at request time via Docker DNS (127.0.0.11) so rebuilding a
# backend never leaves nginx pointing at a stale IP.

worker_processes auto;
events { worker_connections 1024; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    server_tokens off;
    client_max_body_size 5m;

    resolver 127.0.0.11 valid=10s ipv6=off;

    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_http_version 1.1;

    server {
        listen 80;

        # Emit RELATIVE Location headers on redirects. With the default
        # (absolute_redirect on) nginx rebuilds the URL from $host and DROPS the
        # port, so `return 302 /explore` sent the browser to http://localhost/explore
        # instead of http://localhost:8090/explore — broken on every non-:80 origin.
        absolute_redirect off;

        # ---- gateway auth subrequest (validates the beacon_proxy cookie) ----
        # The upstream MUST go through a variable, exactly like every other
        # proxy_pass in this file.
        #
        # With a literal `proxy_pass http://api:8080/...`, nginx resolves the name
        # ONCE at startup and caches that IP forever. The api container gets a new
        # IP on every restart, redeploy or reschedule — so after any API rollout
        # nginx keeps dialling a dead address, the auth subrequest fails with
        # "connect() failed (111: Connection refused)", and EVERY authenticated
        # route behind this gate (/prometheus, /alertmanager, …) returns 500 until
        # someone restarts nginx by hand.
        #
        # A variable forces re-resolution against the `resolver` above on each
        # request, so the gateway follows the API across restarts on its own.
        location = /__beacon_authz {
            internal;
            set $authz http://api:8080;
            proxy_pass              $authz/api/v1/proxy/authorize;
            proxy_pass_request_body off;
            proxy_set_header        Content-Length "";
        }
        # Friendly redirect to the dashboard when the proxy cookie is missing.
        error_page 401 = @needs_login;
        location @needs_login { return 302 /; }

        # ---- Beacon API (full path passed through) ----
        location /api/ {
            set $api http://api:8080;
            proxy_pass $api;
        }
        location = /healthz { set $api http://api:8080; proxy_pass $api; }
        # /readyz is deliberately NOT exposed. Kubernetes probes it directly on the
        # pod's :8080, so publishing it here buys nothing and costs a round trip to
        # Postgres AND Redis for every anonymous request — the cheapest possible way
        # for a stranger to make our database do work.
        location = /livez   { set $api http://api:8080; proxy_pass $api; }

        # ================= Prometheus (tenant-filtered API only) =================
        #
        # We expose the tenant-safe Prometheus *API* and nothing else. The stock
        # Prometheus *UI* is not served to tenants at all — see the redirect below.

        # Block federation outright — it can dump all series across tenants.
        location ^~ /prometheus/federate { return 403; }

        # All Prometheus API traffic goes through prom-label-proxy, which rewrites
        # every expression to pin org_id="<caller>", and 404s the endpoints it
        # cannot scope (/targets, /status/config, /status/tsdb, /alertmanagers).
        # Those are GLOBAL — one Prometheus, one config, one TSDB shared by all
        # tenants — so there is no correct way to show them to one tenant.
        #
        # This regex location is matched BEFORE the prefix redirect below (nginx
        # tries regex locations first), so the Explore page keeps working while the
        # UI is redirected away.
        location ~ ^/prometheus/api/ {
            auth_request     /__beacon_authz;
            auth_request_set $org_id $upstream_http_x_org_id;
            proxy_set_header X-Org-Id $org_id;
            set $plp http://prom-label-proxy-prom:8080;
            rewrite ^/prometheus/(.*)$ /$1 break;
            proxy_pass $plp;
        }
        # The stock Prometheus UI is NOT served to tenants. Send them to Beacon's
        # own Explore page instead.
        #
        # This is a deliberate product decision, not a workaround. Prometheus's UI
        # is an operator console: its Targets, Config, TSDB-Status,
        # Service-Discovery and Alertmanagers pages read state that is GLOBAL to
        # the whole instance — /targets alone lists every tenant's monitor URLs.
        # In a multi-tenant deployment those pages cannot be made to work: the
        # proxy correctly refuses them, so the customer just saw a screen of red
        # "Error: Not Found" boxes. The only way to make them succeed would be to
        # hand every customer every other customer's data.
        #
        # /explore exposes the part that genuinely IS per-tenant (run a query, see
        # your series) using the filtered API above. Operators who need the real
        # thing reach Prometheus out-of-band — never through the tenant gateway.
        location = /prometheus  { return 302 /explore; }
        location /prometheus/   { return 302 /explore; }

        # ================= Alertmanager (tenant-filtered) =================
        location = /alertmanager { return 301 /alertmanager/; }
        location ~ ^/alertmanager/api/ {
            auth_request     /__beacon_authz;
            auth_request_set $org_id $upstream_http_x_org_id;
            proxy_set_header X-Org-Id $org_id;
            set $plpam http://prom-label-proxy-am:8080;
            rewrite ^/alertmanager/(.*)$ /$1 break;
            proxy_pass $plpam;
        }
        location /alertmanager/ {
            auth_request /__beacon_authz;
            set $am http://alertmanager:9093;
            rewrite ^/alertmanager/(.*)$ /$1 break;
            proxy_pass $am;
        }

        # ================= Blackbox — NOT exposed =================
        # Blackbox has no label/query API and cannot be tenant-filtered: its
        # "Recent Probes" page would show every tenant's target URLs. In a
        # multi-tenant deployment it must never be reachable by tenants, so the
        # gateway refuses it. Operators reach Blackbox on the internal network
        # (e.g. `docker compose exec` or a separate operator-only ingress).
        location /blackbox/ { return 404; }

        # ---- Dashboard (Next.js) — everything else ----
        location / {
            set $frontend http://frontend:3000;
            proxy_pass $frontend;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
