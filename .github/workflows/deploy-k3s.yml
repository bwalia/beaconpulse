name: ->Beacon Build/Push Docker Images and Deploy to K3S

# Build the three Beacon images (api, worker, frontend) to SpectonCR and deploy
# the Helm chart to the chosen environment's namespace on k3s. Manual trigger so
# environment promotion is deliberate — same pattern as the opsapi platform.
on:
  # Continuous deployment: every push to main builds the images and deploys to
  # the int environment (TARGET_ENV/DEPLOYMENT_TYPE resolve to int/build-and-deploy
  # via the env: block below, since push events carry no workflow inputs).
  push:
    branches:
      - main

  # Manual promotion to any environment (test/acc/prod) or build/deploy-only.
  workflow_dispatch:
    inputs:
      TARGET_ENV:
        type: choice
        description: "Target environment"
        default: "int"
        required: true
        options:
          - int
          - test
          - acc
          - prod
      DEPLOYMENT_TYPE:
        type: choice
        description: "Build only, deploy only, or both"
        default: "build-and-deploy"
        required: true
        options:
          - build
          - deploy
          - build-and-deploy
      IMAGE_TAG:
        type: string
        description: "Image tag to DEPLOY (deploy-only). Leave blank to use this commit's short SHA."
        default: ""
        required: false

env:
  # SpectonCR (private OCI registry, https via the wslproxy ingress). The host is
  # resolved per environment in the `Resolve registry` step below rather than being
  # hardcoded here — prod sits on the bare host, every other env gets the env
  # prefix. Same convention as the platform's other charts.
  IMAGE_NAMESPACE: beacon
  # The architecture the CLUSTER runs. Every k3s1 node is amd64, and the `build`
  # job runs on ubuntu-latest (also amd64), so this is a NATIVE build — stated
  # explicitly, and asserted before every push, because getting it wrong is
  # silent: the registry accepts the image, helm rolls it out, and only then does
  # the kubelet die with "exec format error", which helm reports ten minutes later
  # as nothing more useful than "Progress deadline exceeded".
  BUILD_PLATFORM: linux/amd64
  # DOCKER_BUILDKIT=0 (the old legacy-builder workaround) is gone. It existed
  # because BuildKit pushed an OCI image *index*, whose manifest HEAD SpectonCR
  # mishandles:
  #   'unexpected status from HEAD request to .../manifests/<digest>'
  # --provenance=false --sbom=false suppresses the attestation manifests that
  # create that index, so buildx emits a single manifest and `docker push` sends
  # exactly what the registry already accepted. Verified against the real registry:
  # zero attestation/manifest-list lines, and the push succeeds.
  BUILDX_FLAGS: --provenance=false --sbom=false
  TARGET_ENV: ${{ github.event.inputs.TARGET_ENV || 'int' }}
  DEPLOYMENT_TYPE: ${{ github.event.inputs.DEPLOYMENT_TYPE || 'build-and-deploy' }}
  # DNS: every environment host is a CNAME to the wslproxy edge, same as the rest
  # of the platform. The hostname itself is read from the env's Helm values file so
  # DNS can never drift from what the Ingress actually serves.
  DNS_ZONE: beaconpulse.net
  # Traffic path: Cloudflare CNAMEs the host to pop0 (the WSL Proxy edge, and the
  # same IP as the prod-our control plane we register the vhost on). pop0 then
  # applies the beaconpulse-prod-default rule, which proxies to the k3s1 Traefik
  # ingress at 13.42.188.136:80, which routes to the beacon pods on debworker00.
  #   browser -> pop0.wslproxy.com -> 13.42.188.136:80 (traefik) -> beacon-nginx
  DNS_TARGET: pop0.wslproxy.com
  DNS_PROXIED: "false" # DNS-only: cert-manager solves HTTP-01 and wslproxy terminates TLS

jobs:
  # Runs before `deploy` so the record exists (and has had a moment to propagate)
  # before cert-manager attempts its HTTP-01 challenge against the new host.
  # Cloudflare only needs egress, not the cluster, so this runs on a hosted runner.
  dns:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure the CNAME for this environment
        if: ${{ env.DEPLOYMENT_TYPE == 'deploy' || env.DEPLOYMENT_TYPE == 'build-and-deploy' }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
          CLOUDFLARE_ZONE: ${{ env.DNS_ZONE }}
        run: |
          set -euo pipefail
          VALUES="deploy/helm/beacon/values-${TARGET_ENV}.yaml"
          [ -f "$VALUES" ] || { echo "no values file for env '${TARGET_ENV}'"; exit 1; }

          # Single source of truth: whatever host the chart's Ingress claims.
          HOST="$(awk '/^host:/{print $2; exit}' "$VALUES")"
          [ -n "$HOST" ] || { echo "no 'host:' in $VALUES"; exit 1; }

          echo "Ensuring ${HOST} -> ${DNS_TARGET} (proxied=${DNS_PROXIED})"
          ./deploy/scripts/cloudflare-dns.sh \
            --name "$HOST" \
            --content "$DNS_TARGET" \
            --proxied "$DNS_PROXIED"

  # DNS now resolves to the edge, so register the vhost + rule on the WSL Proxy
  # control plane BEFORE helm rolls the app — otherwise the hostname resolves to an
  # edge with no config for it. Reuses the manual workflow rather than duplicating
  # the import logic. ACTIVATE_CONFIG=true writes the vhost and takes it live.
  #
  # TARGET_ENV is the WSL Proxy PROFILE, not the Beacon env: every beaconpulse host
  # (int/test/acc + apex) lives under the 'prod' profile dir. The import is
  # idempotent — records are keyed by their committed slug ids.
  wslproxy:
    name: Register WSL Proxy vhost
    needs: [dns]
    if: ${{ (github.event.inputs.DEPLOYMENT_TYPE || 'build-and-deploy') != 'build' }}
    uses: ./.github/workflows/wslproxy-register-domains.yml
    with:
      TARGET_ENV: prod
      ACTIVATE_CONFIG: true
      DRY_RUN: false
    secrets: inherit

  build:
    # GitHub-hosted, and deliberately NOT self-hosted. The k3s nodes are amd64 but
    # the self-hosted runner is an arm64 Mac, so building there produced arm64
    # images and every pod died with "exec format error". Emulating the build for
    # amd64 on that Mac works but is unusably slow (the Next.js stage ran >20min
    # under QEMU and had not finished). ubuntu-latest is already amd64, so the
    # build is NATIVE — correct and fast, with no emulation or cross-compilation.
    #
    # This is only viable because the registry is public: int-spectoncr answers
    # from outside the operator network (HTTP 401 = reachable, needs auth). The
    # `deploy` job must stay self-hosted, because the k3s API does NOT answer from
    # outside (it times out), and neither does the wslproxy control plane.
    runs-on: ubuntu-latest
    outputs:
      registry: ${{ steps.reg.outputs.registry }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute image tag (short SHA)
        id: tag
        run: echo "sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      # Not gated on DEPLOYMENT_TYPE: `deploy`-only runs still need this output.
      - name: Resolve registry for this environment
        id: reg
        run: |
          set -euo pipefail
          case "$TARGET_ENV" in
            prod) REGISTRY="spectoncr.diytaxreturn.co.uk" ;;
            *)    REGISTRY="${TARGET_ENV}-spectoncr.diytaxreturn.co.uk" ;;
          esac

          # Drift guard: the chart must pull from the same host we push to.
          # Without this you can publish to int-spectoncr and have the cluster
          # quietly ImagePullBackOff against a stale registry from the values file.
          VALUES="deploy/helm/beacon/values-${TARGET_ENV}.yaml"
          CHART_REG="$(awk '/^image:/{f=1;next} f && /^  registry:/{print $2; exit}' "$VALUES")"
          if [ "$CHART_REG" != "$REGISTRY" ]; then
            echo "::error::registry drift — workflow resolves '$REGISTRY' but ${VALUES} declares '${CHART_REG}'"
            exit 1
          fi

          echo "registry=$REGISTRY" >> "$GITHUB_OUTPUT"
          echo "Registry for '${TARGET_ENV}': ${REGISTRY}"

      - name: Registry login (SpectonCR)
        if: ${{ env.DEPLOYMENT_TYPE == 'build' || env.DEPLOYMENT_TYPE == 'build-and-deploy' }}
        run: |
          docker login "${{ steps.reg.outputs.registry }}" \
            -u "${{ secrets.NEBULACR_USERNAME }}" \
            -p "${{ secrets.NEBULACR_PASSWORD }}"

      - name: Build & push backend (api + worker share one image)
        if: ${{ env.DEPLOYMENT_TYPE == 'build' || env.DEPLOYMENT_TYPE == 'build-and-deploy' }}
        run: |
          set -euo pipefail
          SHA=${{ steps.tag.outputs.sha }}
          NS="${{ steps.reg.outputs.registry }}/$IMAGE_NAMESPACE"
          # One backend image contains both binaries; api/worker differ by command.
          # --platform is stated explicitly (and asserted below) rather than left
          # implicit: it is the one thing that, if it silently follows the builder
          # instead of the cluster, ships an unrunnable image. On ubuntu-latest this
          # is native. --load lands a plain image in the docker store so the
          # existing `docker push` path sends a manifest SpectonCR accepts
          # (BuildKit's direct --push emits an OCI index, which it mishandles).
          docker buildx build --platform "$BUILD_PLATFORM" $BUILDX_FLAGS --load \
            -f deploy/docker/Dockerfile.backend \
            -t "$NS/api:$SHA" -t "$NS/api:latest" \
            -t "$NS/worker:$SHA" -t "$NS/worker:latest" .
          ./deploy/scripts/assert-image-arch.sh "$NS/api:$SHA"
          docker push "$NS/api:$SHA"
          docker push "$NS/api:latest"
          docker push "$NS/worker:$SHA"
          docker push "$NS/worker:latest"

      - name: Build & push frontend
        if: ${{ env.DEPLOYMENT_TYPE == 'build' || env.DEPLOYMENT_TYPE == 'build-and-deploy' }}
        run: |
          set -euo pipefail
          SHA=${{ steps.tag.outputs.sha }}
          NS="${{ steps.reg.outputs.registry }}/$IMAGE_NAMESPACE"
          # Empty NEXT_PUBLIC_API_BASE_URL => the browser calls the API same-origin
          # (/api/...) through the gateway. No CORS.
          # Native amd64: npm installs arch-specific native modules (next/swc,
          # sharp) which get traced into .next/standalone, so the deps must match
          # the target arch. Building this on the arm64 runner would mean emulating
          # the whole npm/next stage under QEMU — measured at >20min and unfinished.
          docker buildx build --platform "$BUILD_PLATFORM" $BUILDX_FLAGS --load \
            -f frontend/Dockerfile \
            --build-arg NEXT_PUBLIC_API_BASE_URL="" \
            -t "$NS/frontend:$SHA" -t "$NS/frontend:latest" \
            ./frontend
          ./deploy/scripts/assert-image-arch.sh "$NS/frontend:$SHA"
          docker push "$NS/frontend:$SHA"
          docker push "$NS/frontend:latest"

  deploy:
    runs-on: self-hosted
    # Bind to a GitHub Environment named after the target (int/test/prod) so its
    # environment-scoped secrets (e.g. Stripe TEST keys for int/test, LIVE keys for
    # prod) resolve automatically. Repo-level secrets still apply as the fallback,
    # so existing secrets (KUBE_CONFIG_DATA_K3S, …) keep working unchanged.
    environment: ${{ github.event.inputs.TARGET_ENV || 'int' }}
    # `dns` must land before helm, so the record is resolvable by the time
    # cert-manager tries to solve the HTTP-01 challenge for the new host.
    # `wslproxy` must land too: the edge has to hold the vhost + rule before the
    # HTTP-01 challenge (and real traffic) arrives at it. Full chain on push:
    #   dns -> wslproxy -> deploy   (build runs alongside dns/wslproxy)
    needs: [build, dns, wslproxy]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Decode kubeconfig
        if: ${{ env.DEPLOYMENT_TYPE == 'deploy' || env.DEPLOYMENT_TYPE == 'build-and-deploy' }}
        env:
          # KUBE_CONFIG_DATA_K3S holds the current k3s1 cluster kubeconfig
          # (base64) — updated after k3s0 (k3s0.diytaxreturn.co.uk:6443) was
          # decommissioned. Keep the kubeconfig in this secret current.
          KUBECONFIG_BASE64: ${{ secrets.KUBE_CONFIG_DATA_K3S }}
        run: |
          echo "$KUBECONFIG_BASE64" | base64 -d > kubeconfig
          echo "KUBECONFIG=$(pwd)/kubeconfig" >> "$GITHUB_ENV"

      - name: Ensure kubectl
        if: ${{ env.DEPLOYMENT_TYPE == 'deploy' || env.DEPLOYMENT_TYPE == 'build-and-deploy' }}
        run: |
          if ! command -v kubectl >/dev/null 2>&1; then
            curl -sLO "https://dl.k8s.io/release/$(curl -sL https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
            chmod +x kubectl && sudo mv kubectl /usr/local/bin/
          fi

      - name: Ensure Helm
        if: ${{ env.DEPLOYMENT_TYPE == 'deploy' || env.DEPLOYMENT_TYPE == 'build-and-deploy' }}
        run: |
          if ! command -v helm >/dev/null 2>&1; then
            curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
          fi

      - name: Provision billing (Stripe) secrets
        # Creates/updates beacon-billing-secrets in the target namespace directly
        # from GitHub Secrets — no local sealing, no touching the stable sealed
        # beacon-secrets. Idempotent (dry-run | apply). Absent key => billing stays
        # disabled (the chart marks these env optional), which is a safe default.
        if: ${{ env.DEPLOYMENT_TYPE == 'deploy' || env.DEPLOYMENT_TYPE == 'build-and-deploy' }}
        env:
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_PUBLISHABLE_KEY: ${{ secrets.STRIPE_PUBLISHABLE_KEY }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
          STRIPE_PRICE_STARTER: ${{ secrets.STRIPE_PRICE_STARTER }}
          STRIPE_PRICE_PRO: ${{ secrets.STRIPE_PRICE_PRO }}
        run: |
          set -euo pipefail
          kubectl create namespace "$TARGET_ENV" --dry-run=client -o yaml | kubectl apply -f - >/dev/null
          if [ -z "${STRIPE_SECRET_KEY:-}" ]; then
            echo "::notice::No STRIPE_SECRET_KEY set for '$TARGET_ENV' — billing stays disabled."
            exit 0
          fi
          kubectl -n "$TARGET_ENV" create secret generic beacon-billing-secrets \
            --from-literal=STRIPE_SECRET_KEY="$STRIPE_SECRET_KEY" \
            --from-literal=STRIPE_PUBLISHABLE_KEY="${STRIPE_PUBLISHABLE_KEY:-}" \
            --from-literal=STRIPE_WEBHOOK_SECRET="${STRIPE_WEBHOOK_SECRET:-}" \
            --from-literal=STRIPE_PRICE_STARTER="${STRIPE_PRICE_STARTER:-}" \
            --from-literal=STRIPE_PRICE_PRO="${STRIPE_PRICE_PRO:-}" \
            --dry-run=client -o yaml | kubectl apply -f -
          echo "::notice::beacon-billing-secrets applied to '$TARGET_ENV'."

      - name: Deploy Beacon Helm chart
        if: ${{ env.DEPLOYMENT_TYPE == 'deploy' || env.DEPLOYMENT_TYPE == 'build-and-deploy' }}
        run: |
          set -euo pipefail
          TAG="${{ github.event.inputs.IMAGE_TAG }}"
          [ -z "$TAG" ] && TAG="${GITHUB_SHA::7}"
          echo "Deploying beacon to '$TARGET_ENV' namespace with image tag '$TAG'..."
          # image.registry is pinned to the host the build job actually pushed to,
          # so a values-file edit can never send the cluster to a different registry.
          helm upgrade --install beacon ./deploy/helm/beacon \
            -f ./deploy/helm/beacon/values-${TARGET_ENV}.yaml \
            --set image.registry="${{ needs.build.outputs.registry }}" \
            --set image.tag="$TAG" \
            --namespace "$TARGET_ENV" --create-namespace \
            --wait --timeout 10m

      - name: Rollout status
        if: ${{ env.DEPLOYMENT_TYPE == 'deploy' || env.DEPLOYMENT_TYPE == 'build-and-deploy' }}
        run: |
          kubectl -n "$TARGET_ENV" rollout status deploy/beacon-api --timeout=5m || true
          # The namespace is shared with other products, so scope the listing to ours.
          kubectl -n "$TARGET_ENV" get pods -o wide -l app.kubernetes.io/part-of=beacon

      - name: Slack notification
        if: ${{ always() && (env.DEPLOYMENT_TYPE == 'deploy' || env.DEPLOYMENT_TYPE == 'build-and-deploy') }}
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_CHANNEL: general
          SLACK_COLOR: ${{ job.status }}
          SLACK_TITLE: "Beacon deployment status"
          SLACK_MESSAGE: "Beacon deployed to ${{ env.TARGET_ENV }} :rocket:"
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
        continue-on-error: true
